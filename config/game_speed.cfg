[battle]
spell_resolve_speed=0.4
enemy_turn_speed=0.5
between_battles_pause=0.3
; 024-wave-editor: pause between wave snapshot apply and unlocking input.
wave_transition_sec=0.15

[ui]
dialogue_typewriter_chars_per_sec=60.0
dialogue_auto_advance_after_sec=3.0
upgrade_screen_min_display=2.0
respawn_animation_duration=1.5
floating_number_duration_ms=700
floating_number_crit_duration_ms=1100
toast_fade_in_sec=0.18
toast_fade_out_sec=0.20
toast_default_duration_sec=2.5
; 024-wave-editor: timeline tick pulse on turns-to-next decrement.
wave_tick_anim_sec=0.2
; 024-wave-editor: score corner punch tween on RunScore.add().
score_punch_sec=0.25

[meta]
boss_intro_duration=3.0
; 035-game-editor: level transition (metamorphosis). Total ~1.75s out + 0.6s in.
transition_shake_sec=0.4
transition_distort_sec=0.6
transition_hold_sec=0.15
transition_fade_in_sec=0.6
; 035-game-editor: max time CampaignController waits for upgrade screen / cutscene
; system to call its on_done callback before proceeding. With no listener
; (or stub disabled), this is the gap before transition starts.
upgrade_choice_timeout_sec=0.5
cutscene_request_timeout_sec=0.5

[clock]
tick_animation_duration=0.2

[arena]
step_duration=0.18
path_step_pause=0.05
hover_highlight_fade=0.1
stun_skip_delay=0.4

[godmode]
ability_cast_delay=0.05
zoom_step=0.1
zoom_min=0.2
zoom_max=3.0
zoom_lerp_duration=0.12

; 047-skill-fx-system: per-channel ability FX timings.
; cast_animation_ms     — caster.Body shader-flash duration (one-shot)
; collision_effect_ms   — legacy single-color flash duration (registry-miss fallback)
; flash_color_intensity — peak flash_amount value reached during legacy flash tween
; telegraph_pulse_*     — looped pulse on AI-controlled actors with cast_intent
; hex_effect_size_px    — square size for hex-mode collision effects (default_summon)
[fx]
cast_animation_ms=180
collision_effect_ms=140
flash_color_intensity=0.85
telegraph_pulse_period_ms=1000
telegraph_pulse_intensity=0.4
hex_effect_size_px=72

; 048-corpse-absorption — death ritual (per-corpse, on actor_died)
corpse_death_total_sec=0.65
corpse_death_hop_height_px=18.0
corpse_death_blink_count=3
corpse_death_blink_intensity=0.85
corpse_death_shrink_to=0.85
corpse_death_topple_deg=85.0

; 048-corpse-absorption — absorption ritual (post-final-wave, all corpses)
absorption_total_sec=2.5
absorption_per_corpse_jitter_sec=0.35
absorption_speed_jitter=0.15
absorption_bezier_perp_factor=0.18
absorption_blink_period_sec=0.12
absorption_blink_intensity=0.55
absorption_corpse_shrink_to=0.0
absorption_heroine_pulse_count=4
absorption_heroine_scale_punch=1.06
absorption_heroine_tint_mix=0.5
absorption_screen_shake_amp_px=4.0
absorption_screen_shake_freq=22.0
absorption_arrival_shake_amp_px=2.5
absorption_arrival_shake_freq=30.0
absorption_arrival_shake_sec=0.12
absorption_particle_amount=64
absorption_particle_tint_mix=0.65
